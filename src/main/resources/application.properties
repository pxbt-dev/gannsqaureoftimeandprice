# Server Configuration
server.port=${PORT:8080}

# Bind to all interfaces (critical for Railway)
server.address=0.0.0.0

# Actuator Endpoints
management.endpoints.web.exposure.include=health,metrics,info,env
management.endpoint.health.show-details=always

# Logging
logging.level.com.pxbt.dev.gannsquaretimeprice=DEBUG

# App Info
info.app.name=Gann Square Time Price
info.app.version=1.0.0
spring.web.resources.add-mappings=true
spring.mvc.static-path-pattern=/**

# Show full error details
server.error.include-stacktrace=always
server.error.include-message=always
logging.level.org.springframework.web=DEBUG
logging.level.com.pxbt.dev=DEBUG

# Enable detailed request logging
spring.mvc.log-request-details=true

logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG